name: Apache Hudi Timeline Server API
description: Shared capability definitions for Apache Hudi Timeline Server table and timeline operations
baseUrl: http://localhost:9090
transport: rest
version: "0.15.0"
operations:
  - operationId: getTimeline
    name: Apache Hudi Get Timeline
    description: Get the complete timeline of instants for a Hudi table
    method: GET
    path: /v1/hoodie/timeline/{tableName}
    parameters:
      - name: tableName
        in: path
        required: true
        type: string
    tags:
      - Timeline

  - operationId: getCommitMetadata
    name: Apache Hudi Get Commit Metadata
    description: Get metadata for a specific commit on the Hudi timeline
    method: GET
    path: /v1/hoodie/timeline/{tableName}/commits/{commitTime}
    parameters:
      - name: tableName
        in: path
        required: true
        type: string
      - name: commitTime
        in: path
        required: true
        type: string
    tags:
      - Timeline

  - operationId: createTable
    name: Apache Hudi Create Table
    description: Create a new Hudi table with the provided configuration
    method: POST
    path: /v1/hoodie/table
    tags:
      - Tables

  - operationId: getTable
    name: Apache Hudi Get Table
    description: Get configuration and metadata for a Hudi table
    method: GET
    path: /v1/hoodie/table/{tableName}
    parameters:
      - name: tableName
        in: path
        required: true
        type: string
    tags:
      - Tables

  - operationId: runCleaning
    name: Apache Hudi Run Cleaning
    description: Trigger a cleaning operation to remove old file versions
    method: POST
    path: /v1/hoodie/table/{tableName}/clean
    parameters:
      - name: tableName
        in: path
        required: true
        type: string
    tags:
      - Tables
